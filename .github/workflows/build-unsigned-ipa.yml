name: Build PatternLab 3.0 IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "WiFiVaultPatternLab/**"
      - "WiFiVault.xcodeproj/**"
      - "PatternLabTests/**"
      - "Tools/**"
      - ".github/workflows/build-unsigned-ipa.yml"

permissions:
  contents: read

jobs:
  build:
    name: Validate and build isolated iOS app
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate source and public pack
        run: |
          chmod +x Tools/validate-source.sh Tools/run-core-tests.sh
          ./Tools/validate-source.sh

      - name: Run optimized core and million-line benchmark
        run: ./Tools/run-core-tests.sh

      - name: Inspect target settings
        run: |
          xcodebuild \
            -project "$GITHUB_WORKSPACE/WiFiVault.xcodeproj" \
            -scheme WiFiVaultPatternLab \
            -configuration Release \
            -showBuildSettings > /tmp/patternlab-settings.txt

          grep -E "PRODUCT_BUNDLE_IDENTIFIER|IPHONEOS_DEPLOYMENT_TARGET|MARKETING_VERSION|CODE_SIGN_ENTITLEMENTS" \
            /tmp/patternlab-settings.txt || true

          if awk -F '=' '/CODE_SIGN_ENTITLEMENTS/ { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); if (length($2) > 0) exit 1 }' \
            /tmp/patternlab-settings.txt; then
            true
          else
            echo "Unexpected entitlements declared"
            exit 1
          fi

      - name: Build unsigned iPhone app
        run: |
          rm -rf "$GITHUB_WORKSPACE/build-patternlab"
          xcodebuild \
            -project "$GITHUB_WORKSPACE/WiFiVault.xcodeproj" \
            -scheme WiFiVaultPatternLab \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$GITHUB_WORKSPACE/build-patternlab" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Validate built product isolation and resources
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build-patternlab/Build/Products/Release-iphoneos/WiFiVaultPatternLab.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Info.plist"
          test -f "$APP_PATH/PrivacyInfo.xcprivacy"
          test -f "$APP_PATH/PatternLabPublicPack.bundle/manifest.json"

          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")"
          test -f "$APP_PATH/$EXECUTABLE_NAME"

          if otool -L "$APP_PATH/$EXECUTABLE_NAME" | grep -q NetworkExtension; then
            echo "Executable unexpectedly links NetworkExtension"
            exit 1
          fi
          if strings "$APP_PATH/$EXECUTABLE_NAME" | grep -E \
            "NEHotspotConfigurationManager|AutoConnectManager|ContinuousVerificationManager|PasswordTesterManager"; then
            echo "Executable contains a forbidden verification symbol"
            exit 1
          fi

          node Tools/validate-public-pack.mjs "$APP_PATH/PatternLabPublicPack.bundle"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package unsigned IPA and metadata
        run: |
          rm -rf "$GITHUB_WORKSPACE/Payload"
          mkdir -p "$GITHUB_WORKSPACE/Payload"
          /usr/bin/ditto "$APP_PATH" "$GITHUB_WORKSPACE/Payload/WiFiVaultPatternLab.app"

          cd "$GITHUB_WORKSPACE"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload PatternLab-3.0-unsigned.ipa
          unzip -t PatternLab-3.0-unsigned.ipa
          shasum -a 256 PatternLab-3.0-unsigned.ipa | tee PatternLab-3.0-unsigned.sha256

          IPA_BYTES="$(stat -f %z PatternLab-3.0-unsigned.ipa)"
          APP_BYTES="$(du -sk "$APP_PATH" | awk '{print $1 * 1024}')"
          {
            echo "Marketing version: 3.0.0"
            echo "Build number: 300"
            echo "Unsigned IPA bytes: $IPA_BYTES"
            echo "Uncompressed app bytes: $APP_BYTES"
            echo "Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee PatternLab-3.0-build-metadata.txt

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PatternLab-3.0-unsigned-IPA
          path: |
            PatternLab-3.0-unsigned.ipa
            PatternLab-3.0-unsigned.sha256
            PatternLab-3.0-build-metadata.txt
          if-no-files-found: error
          retention-days: 14
